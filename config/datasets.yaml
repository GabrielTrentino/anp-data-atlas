    categoria: abastecimento

  cadastro-revendas-glp:
    page: cadastro-de-revendedores-de-glp
    categoria: abastecimento

  pontos-abastecimento:
    page: pontos-de-abastecimento-autorizados
    categoria: abastecimento

  distribuidores-combustiveis-liquidos:
    page: distribuidores-de-combustiveis-liquidos
    categoria: abastecimento

  pmqc:
    page: programa-de-monitoramento-da-qualidade-dos-combustiveis
    categoria: abastecimento

  pml:
    page: programa-de-monitoramento-dos-lubrificantes
    categoria: abastecimento

  serie-historica-precos:
    page: serie-historica-de-precos-de-combustiveis
    categoria: abastecimento

  vendas-derivados:
    page: vendas-de-derivados-de-petroleo-e-biocombustiveis
    categoria: abastecimento

  fiscalizacao-abastecimento:
    page: acoes-de-fiscalizacao-do-abastecimento
    categoria: abastecimento

  capacidade-armazenagem-terminais:
    page: capacidade-de-armazenagem-de-terminais
    categoria: abastecimento

  movimentacao-terminais-aquaviarios:
    page: movimentacao-de-terminais-aquaviarios
    categoria: abastecimento

  registro-lubrificantes:
    page: registro-de-oleos-e-graxas-lubrificantes
    categoria: abastecimento

  # --- Produção, refino e biocombustíveis ---
  processamento-petroleo-derivados:
    page: processamento-de-petroleo-e-producao-de-derivados
