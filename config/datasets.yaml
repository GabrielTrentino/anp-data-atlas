    categoria: producao

  # --- Exploração e produção (E&P) ---
  dados-ep:
    page: dados-de-e-p
    categoria: ep

  fase-exploracao:
    page: fase-de-exploracao
    categoria: ep

  fase-desenvolvimento-producao:
