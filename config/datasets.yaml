    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [Contrato, Ano]
    cruzamentos: [fase-exploracao, rodadas-licitacoes]

  relacao-concessionarios:
    page: relacao-de-concessionarios
    categoria: ep
