    categoria: regulacao

  fiscalizacao-conteudo-local:
    page: fiscalizacao-de-conteudo-local
    categoria: regulacao

  multas-2016:
    page: multas-aplicadas-com-vencimento-a-partir-de-2016
    categoria: regulacao

  participacoes-governamentais:
    page: participacoes-governamentais
    categoria: regulacao

  pesquisa-desenvolvimento-inovacao:
    page: pesquisa-desenvolvimento-e-inovacao
    categoria: regulacao

  prestadores-apoio-administrativo:
    page: prestadores-de-servico-de-apoio-administrativo
    categoria: regulacao

# --- Conjuntos indisponíveis (sem CSV/XLSX no portal) ---
indisponiveis:
  anuario-estatistico:
    page: anuario-estatistico
    categoria: producao
    motivo: Sem CSV público — apenas PDF/painel

  autorizacoes-gas-natural:
    page: autorizacoes-de-gas-natural
    categoria: gas
    motivo: Página removida do portal (404)

  resultado-poco:
    page: resultado-de-poco
    categoria: ep
    motivo: Apenas metadados (PDF) — CSV via BDEP
