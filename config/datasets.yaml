# Configuração dos 42 conjuntos de dados abertos ANP
# Usado por scripts/download_raw_all.py e outros scripts do atlas.

base_url: https://www.gov.br/anp/pt-br/centrais-de-conteudo/dados-abertos
user_agent: "Mozilla/5.0 (anp-data-atlas; research)"
max_files_per_dataset: 20

datasets:
