    categoria: gas

  # --- Acervo técnico e geociências ---
  acervo-dados-tecnicos:
    page: acervo-de-dados-tecnicos
    categoria: acervo

  amostras-rochas-fluidos:
    page: amostras-de-rochas-e-fluidos
    categoria: acervo

  aquisicao-processamento-estudo-dados:
    page: aquisicao-processamento-e-estudo-de-dados
