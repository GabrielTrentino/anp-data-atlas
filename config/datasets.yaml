  tancagem-abastecimento:
    page: tancagem-do-abastecimento-nacional
    categoria: abastecimento

  movimentacao-derivados:
    page: movimentacao-de-derivados-de-petroleo-glp-e-biocombustiveis
    categoria: abastecimento

  cadastro-revendas-combustiveis:
