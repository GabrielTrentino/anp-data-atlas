    unidade_anp: SDP
    periodicidade: Sob demanda
    formato: CSV
    fonte: Contratos E&P
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [CNPJ_Operador]
    cruzamentos: [fase-exploracao, rodadas-licitacoes]

  rodadas-licitacoes:
    page: rodadas-de-licitacoes-de-petroleo-e-gas-natural
    categoria: ep
    titulo: Rodadas de Licitações
    unidade_anp: SDP
