  producao-por-estado:
    page: producao-de-petroleo-e-gas-natural-por-estado-e-localizacao
    categoria: producao
    titulo: Produção de petróleo e gás natural por estado e localização
    unidade_anp: SDC / SDP
    periodicidade: Mensal
    formato: CSV
    fonte: E&P / estatística ANP
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [ANO, MES, UF]
    cruzamentos: [importacoes-exportacoes]

  producao-por-poco:
    page: producao-de-petroleo-e-gas-natural-por-poco
    categoria: producao
    titulo: Produção de Petróleo e Gás Natural por Poço
    unidade_anp: SDP
    periodicidade: Mensal
    formato: ZIP → CSV
    fonte: E&P
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [Poço, Ano, Mês/Ano]
    cruzamentos: [producao-por-estado]

  importacoes-exportacoes:
    page: importacoes-e-exportacoes
    categoria: producao
    titulo: Importações e exportações
    unidade_anp: SDC
    periodicidade: Mensal
    formato: CSV
    fonte: Estatística ANP / comércio exterior
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [ANO, MÊS, PRODUTO, OPERAÇÃO COMERCIAL]
    cruzamentos: [vendas-derivados, processamento-petroleo-derivados]

  # ═══════════════════════════════════════════════════════════════════
  # Exploração e produção (E&P)
  # ═══════════════════════════════════════════════════════════════════

  dados-ep:
    page: dados-de-e-p
    categoria: ep
    titulo: Dados de E&P
    unidade_anp: SDP
    periodicidade: Sob demanda
    formato: PDF / SHP
    fonte: BDEP
    schema:
      encoding: null
      separator: null
      key_columns: []
    cruzamentos: [fase-exploracao, fase-desenvolvimento-producao]

  fase-exploracao:
    page: fase-de-exploracao
    categoria: ep
    titulo: Fase de Exploração
    unidade_anp: SDP
    periodicidade: Mensal
    formato: CSV
    fonte: Contratos E&P
    schema:
      encoding: latin-1
      separator: ";"
      key_columns: [BLOCO]
    cruzamentos: [rodadas-licitacoes, relacao-concessionarios]

  fase-desenvolvimento-producao:
    page: fase-de-desenvolvimento-e-producao
    categoria: ep
    titulo: Fase de Desenvolvimento e Produção
    unidade_anp: SDP
    periodicidade: Mensal
    formato: CSV
    fonte: Contratos E&P
    schema:
      encoding: misto (utf-8-sig / latin-1)
      separator: ";"
      key_columns: [Campo, Ano, Mês/Ano]
    cruzamentos: [producao-por-estado, producao-por-poco]

  blocos-fase-exploratoria-encerrada:
