# Configuração centralizada dos 42 conjuntos de dados abertos ANP
# Fonte única de verdade — usado por scripts de download, validação e geração de docs.

base_url: https://www.gov.br/anp/pt-br/centrais-de-conteudo/dados-abertos
user_agent: "Mozilla/5.0 (anp-data-atlas; research)"
max_files_per_dataset: 20

datasets:

  # ═══════════════════════════════════════════════════════════════════
  # Abastecimento, distribuição e mercado downstream
  # ═══════════════════════════════════════════════════════════════════

  tancagem-abastecimento:
    page: tancagem-do-abastecimento-nacional
    categoria: abastecimento
    titulo: Tancagem do Abastecimento Nacional
    unidade_anp: SDL
    periodicidade: Mensal
    formato: CSV
    fonte: SIMP — Resolução ANP nº 17/2004
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [CodInstalacao, Tag, GrupoDeProdutos, Data]
    cruzamentos: [movimentacao-derivados, cadastro-revendas-combustiveis]

  movimentacao-derivados:
    page: movimentacao-de-derivados-de-petroleo-glp-e-biocombustiveis
    categoria: abastecimento
    titulo: Movimentação de derivados de petróleo, gás natural e biocombustíveis
    unidade_anp: SDL
    periodicidade: Mensal
    formato: CSV / ZIP
    fonte: SIMP — Resolução ANP nº 729/2018
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [Ano, Mês, Agente Regulado, Código do Produto, UF Origem]
    cruzamentos: [tancagem-abastecimento, cadastro-revendas-combustiveis, vendas-derivados, serie-historica-precos]

  cadastro-revendas-combustiveis:
    page: cadastro-de-revendedores-varejistas
    categoria: abastecimento
    titulo: Dados Cadastrais dos Revendedores Varejistas de Combustíveis Automotivos
    unidade_anp: SDL
    periodicidade: Diária
    formato: CSV
    fonte: Cadastro ANP / i-SIMP
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [cnpj]
    cruzamentos: [tancagem-abastecimento, pontos-abastecimento, serie-historica-precos, movimentacao-derivados]

  cadastro-revendas-glp:
    page: cadastro-de-revendedores-de-glp
    categoria: abastecimento
    titulo: Dados Cadastrais das Revendas de Gás Liquefeito de Petróleo (GLP)
    unidade_anp: SDL
    periodicidade: Diária
    formato: CSV
    fonte: Cadastro ANP
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [cnpj]
    cruzamentos: [movimentacao-derivados, tancagem-abastecimento]

  pontos-abastecimento:
    page: pontos-de-abastecimento-autorizados
    categoria: abastecimento
    titulo: Pontos de Abastecimento Autorizados
    unidade_anp: SDL
    periodicidade: Diário
    formato: PDF (sem CSV público)
    fonte: Cadastro ANP
    schema:
      encoding: null
      separator: null
      key_columns: [CodInstalacao, Cnpj]
    cruzamentos: [cadastro-revendas-combustiveis, fiscalizacao-abastecimento]

  distribuidores-combustiveis-liquidos:
    page: distribuidores-de-combustiveis-liquidos
    categoria: abastecimento
    titulo: Distribuidores de combustíveis líquidos
    unidade_anp: SDL
    periodicidade: Mensal / Semanal / Semestral
    formato: CSV
    fonte: Cadastro e autorizações ANP
    schema:
      encoding: latin-1
      separator: ";"
      key_columns: [Cnpj]
    cruzamentos: [movimentacao-derivados, capacidade-armazenagem-terminais]

  pmqc:
    page: programa-de-monitoramento-da-qualidade-dos-combustiveis
    categoria: abastecimento
    titulo: Programa de Monitoramento da Qualidade dos Combustíveis (PMQC)
    unidade_anp: SBQ
    periodicidade: Mensal
    formato: CSV / JSON
    fonte: PMQC / fiscalização analítica
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [cnpj, data_coleta, grupo_produto]
    cruzamentos: [fiscalizacao-abastecimento, cadastro-revendas-combustiveis]

  pml:
    page: programa-de-monitoramento-dos-lubrificantes
    categoria: abastecimento
    titulo: Programa de Monitoramento dos Lubrificantes (PML)
    unidade_anp: SBQ
    periodicidade: Conforme programa
    formato: CSV
    fonte: PML
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [amostra]
    cruzamentos: [movimentacao-derivados, registro-lubrificantes]

  serie-historica-precos:
    page: serie-historica-de-precos-de-combustiveis
    categoria: abastecimento
    titulo: Série Histórica de Preços de Combustíveis
    unidade_anp: SDC
    periodicidade: Semanal (LPC)
    formato: CSV
    fonte: Levantamento de Preços de Combustíveis (LPC)
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [cnpj, produto, data_coleta]
    cruzamentos: [vendas-derivados, cadastro-revendas-combustiveis, tancagem-abastecimento]

  vendas-derivados:
    page: vendas-de-derivados-de-petroleo-e-biocombustiveis
    categoria: abastecimento
    titulo: Vendas de derivados de petróleo e biocombustíveis
    unidade_anp: SDC
    periodicidade: Mensal / Anual
    formato: CSV
    fonte: Estatística ANP / distribuidoras
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [ano, mes, uf, produto]
    cruzamentos: [movimentacao-derivados, producao-biocombustiveis, importacoes-exportacoes]

  fiscalizacao-abastecimento:
    page: acoes-de-fiscalizacao-do-abastecimento
    categoria: abastecimento
    titulo: Ações de Fiscalização do Abastecimento
    unidade_anp: SFI
    periodicidade: Mensal
    formato: XLSX
    fonte: Fiscalização ANP
    schema:
      encoding: utf-8
      separator: null
      key_columns: [Cnpj, DataAcao]
    cruzamentos: [pmqc, cadastro-revendas-combustiveis]

  capacidade-armazenagem-terminais:
    page: capacidade-de-armazenagem-de-terminais
    categoria: abastecimento
    titulo: Capacidade de Armazenagem de Terminais
    unidade_anp: SIM
    periodicidade: Semestral
    formato: CSV
    fonte: Cadastro de terminais ANP
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [Operador, UF, Tipo]
    cruzamentos: [tancagem-abastecimento, movimentacao-terminais-aquaviarios]

  movimentacao-terminais-aquaviarios:
    page: movimentacao-de-terminais-aquaviarios
    categoria: abastecimento
    titulo: Movimentação dos Terminais Aquaviários
    unidade_anp: SIM
    periodicidade: Mensal
    formato: CSV
    fonte: Terminais aquaviários
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [terminal, periodo, produto]
    cruzamentos: [capacidade-armazenagem-terminais, movimentacao-derivados]

  registro-lubrificantes:
    page: registro-de-oleos-e-graxas-lubrificantes
    categoria: abastecimento
    titulo: Registro de Óleos e Graxas Lubrificantes
    unidade_anp: SDL
    periodicidade: Conforme demanda
    formato: CSV
    fonte: Registro de produtos
    schema:
      encoding: utf-8-sig
      separator: ";"
      key_columns: [RegistroANP]
    cruzamentos: [pml, movimentacao-derivados]

  # ═══════════════════════════════════════════════════════════════════
  # Produção, refino e biocombustíveis
  # ═══════════════════════════════════════════════════════════════════

  processamento-petroleo-derivados:
    page: processamento-de-petroleo-e-producao-de-derivados
    categoria: producao
    titulo: Processamento de petróleo e produção de derivados
    unidade_anp: SDC
    periodicidade: Mensal
    formato: CSV
